name: daily-snapshot

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run collect
        env:
          PHABRICATOR_TOKEN: ${{ secrets.PHABRICATOR_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Commit snapshot
        run: |
          git config user.name  "hnt-tat-bot"
          git config user.email "hnt-tat-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(data): daily snapshot $(date -u +%F)"
            git push
          fi
